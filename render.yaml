# ──────────────────────────────────────────────────────────────────────────
# Render Blueprint – Valloreg
#
# Egyetlen fájlból létrehozza a 3 szolgáltatást egy ÚJ Render projektben,
# teljesen KÜLÖN a meglévő dolgaidtól:
#   - valloreg-redis  : Key Value (Redis) a BullMQ feldolgozó sorhoz
#   - valloreg-api    : NestJS backend (REST API + worker)
#   - valloreg-web    : Next.js PWA frontend
#
# A titkokat (DATABASE_URL, R2 kulcsok, stb.) NEM tartalmazza – azokat a Render
# felületén állítod be (sync: false), vagy a Render generálja (generateValue).
# Lépésről lépésre: docs/DEPLOY.md
#
# MEGJEGYZÉS: ha a Render nem fogadja el a `type: keyvalue` értéket (régebbi
# fiók), írd át `redis`-re. A többi változatlan.
# ──────────────────────────────────────────────────────────────────────────

services:
  # ── Redis / Key Value (BullMQ) ──────────────────────────────────────────
  - type: keyvalue
    name: valloreg-redis
    plan: free
    region: frankfurt
    ipAllowList: [] # csak belső (Render hálózaton belüli) hozzáférés
    maxmemoryPolicy: noeviction

  # ── API (NestJS) ────────────────────────────────────────────────────────
  - type: web
    name: valloreg-api
    runtime: node
    region: frankfurt
    plan: free
    # A monorepo gyökeréből telepítünk és buildelünk. FONTOS: a Prisma migráció
    # NEM a buildben fut, hanem az indításkor (lásd startCommand). Így egy
    # migrációs hiba (pl. beragadt migráció) NEM bukatja meg a buildet, és az új
    # API-verzió mindenképp deployol – a migrációs hiba a runtime-logban látszik,
    # nem brickeli be némán az összes jövőbeli deployt.
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @valloreg/shared build &&
      pnpm --filter @valloreg/api prisma:generate &&
      pnpm --filter @valloreg/api build
    # Indításkor előbb (idempotens) migrációt futtatunk, MAJD indul az API. A
    # migráció NEM-fatális (`|| echo …`): ha hibázik, az API akkor is elindul, és
    # a tényleges hiba a logból kiderül. Egészséges DB esetén ez létrehozza a
    # hiányzó táblákat is (pl. vehicle_scans).
    startCommand: >-
      corepack enable;
      pnpm --filter @valloreg/api prisma:deploy || echo 'prisma migrate deploy FAILED – continuing to start API (lásd a hibat fentebb)';
      node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_GLOBAL_PREFIX
        value: api
      # Neon – kézzel állítsd be (sync: false):
      #   DATABASE_URL = POOLED (-pooler) string + KÖTELEZŐ pgbouncer=true
      #                  pl. ...neon.tech/neondb?sslmode=require&pgbouncer=true
      #                  (e nélkül a regisztráció 500-zal elszáll a pooleren!)
      #   DIRECT_URL   = DIRECT (pooler NÉLKÜLI) string ?sslmode=require (migrációhoz)
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Redis a társszolgáltatásból (automatikus):
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: valloreg-redis
          property: connectionString
      # JWT + titkosító kulcs – a Render generálja:
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: INTEGRATION_ENC_KEY
        generateValue: true
      # A web origin a CORS-hoz (igazítsd, ha más a web URL):
      - key: CORS_ORIGINS
        value: https://valloreg-web.onrender.com
      # A webes frontend nyilvános URL-je a jelszó-visszaállító e-mail linkjéhez.
      # (Ha üres, a CORS_ORIGINS első elemére esik vissza.)
      - key: WEB_APP_URL
        value: https://valloreg-web.onrender.com
      # KAPCSOLÓ (auth cookie): same-origin auth proxy. Ha "true", a refresh
      # cookie SameSite=Lax (first-party). EGYÜTT kell bekapcsolni a web
      # NEXT_PUBLIC_SAME_ORIGIN_AUTH-tal. Alap: false (cross-site, SameSite=None).
      - key: SAME_ORIGIN_FRONTEND
        value: "true"
      # Háttér-ütemezők (reminders/reports/verification/benchmark). 1 instance
      # (Render free) esetén marad "true". Több instance-ra skálázva állítsd
      # "false"-ra MINDEN instance-on, KIVÉVE egyet, hogy a jobok ne fussanak
      # többször (duplikált e-mail/push).
      - key: SCHEDULER_ENABLED
        value: "true"
      # Cloudflare R2 (S3-kompatibilis) – kézzel állítsd be:
      - key: S3_ENDPOINT
        sync: false # https://<ACCOUNT_ID>.r2.cloudflarestorage.com
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: valloreg-documents
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      # AI / OCR – Gemini Vision (valódi olvasás). FONTOS: ezek `value`-k, ezért a
      # Blueprint MINDEN szinkronnál ráírja a szolgáltatásra – tehát itt KELL
      # `gemini`-nek lennie, különben a sync visszaállítja stubra a dashboardon
      # kézzel beállított értéket (ez okozta a „nem olvas” hibát).
      - key: EXTRACTION_PROVIDER
        value: gemini
      - key: OCR_PROVIDER
        value: gemini
      # A Gemini API-kulcs titok – a Render dashboardon kell beállítani:
      - key: GEMINI_API_KEY
        sync: false
      # RO megfelelőség-ellenőrzés (ITP/RCA/rovinietă). Alap: stub (álladat).
      # Valódi forráshoz: VEHICLE_VERIFY_PROVIDER=ro + RO_VERIFY_API_URL (+ kulcs).
      - key: VEHICLE_VERIFY_PROVIDER
        value: stub
      - key: RO_VERIFY_API_URL
        sync: false
      - key: RO_VERIFY_API_KEY
        sync: false
      # E-mail (Brevo) – opcionális, meghívókhoz:
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        sync: false
      - key: MAIL_FROM
        sync: false
      # A feladó megjelenített neve (módosítható). Alap: Valloreg.
      - key: MAIL_FROM_NAME
        value: Valloreg
      # Web Push (VAPID) – opcionális:
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      # Utalásos fizetés – bankszámla adatok + fejlesztői értesítési e-mail:
      - key: BANK_TRANSFER_BENEFICIARY
        sync: false
      - key: BANK_TRANSFER_IBAN
        sync: false
      - key: BANK_TRANSFER_BANK
        sync: false
      - key: BANK_TRANSFER_SWIFT
        sync: false
      - key: BILLING_NOTIFY_EMAIL
        sync: false

  # ── Web (Next.js PWA) ───────────────────────────────────────────────────
  - type: web
    name: valloreg-web
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @valloreg/shared build &&
      pnpm --filter @valloreg/web build
    startCommand: pnpm --filter @valloreg/web start
    envVars:
      - key: NODE_ENV
        value: production
      # Build-idő: kikapcsolt telemetria (kicsivel kevesebb memória/zaj a buildben).
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      # A build-időben beépül a bundle-be; igazítsd, ha más az API URL:
      - key: NEXT_PUBLIC_API_URL
        value: https://valloreg-api.onrender.com/api
      # KAPCSOLÓ (auth cookie): same-origin auth proxy. Ha "true", a Next a
      # /api/auth/* hívásokat a saját originjáról proxyzza az API-ra → a refresh
      # cookie first-party (SameSite=Lax), nincs harmadik-fél-cookie gond.
      # EGYÜTT kell bekapcsolni az API SAME_ORIGIN_FRONTEND-jével (mindkettő
      # "true"). Build-időben épül be, ezért váltás után újra kell deployolni a
      # webet. Alap: false (a mostani cross-site működés marad).
      - key: NEXT_PUBLIC_SAME_ORIGIN_AUTH
        value: "true"
      - key: NEXT_PUBLIC_APP_NAME
        value: Valloreg
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
