name: queue-probe

# IDEIGLENES: a /api/health/queues – megvarja, amig az extractionProvider 'gemini' lesz.
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Var a gemini providerre + kiirja a JSON-t
        run: |
          URL="https://valloreg-api.onrender.com/api/health/queues"
          for i in $(seq 1 30); do
            BODY=$(curl -s "$URL" --max-time 90)
            echo "[$i] $BODY"
            if echo "$BODY" | grep -q '"extractionProvider":"gemini"'; then
              echo "===== KESZ: gemini aktiv ====="
              exit 0
            fi
            echo "  meg nem gemini, varok 20s..."
            sleep 20
          done
          echo "Nem valt gemini-re a varakozasi ablakban (lehet, hogy a Blueprint-et kezzel kell szinkronizalni)."
          exit 1
