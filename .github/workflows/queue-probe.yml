name: queue-probe

# IDEIGLENES: a /api/health/queues sor- ES DB-allapotot kerdezi le (varja a deployt).
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Queue + DB allapot (uj 'env' mezore var)
        run: |
          URL="https://valloreg-api.onrender.com/api/health/queues"
          for i in $(seq 1 24); do
            BODY=$(curl -s "$URL" --max-time 90)
            # Az uj deploy ismerve van, ha mar tartalmazza az "env" mezot.
            if echo "$BODY" | grep -q '"env"'; then
              echo "===== HEALTH/QUEUES JSON (uj) ====="
              echo "$BODY"
              exit 0
            fi
            echo "[$i] meg a regi valasz (nincs 'env'), varok 20s..."
            sleep 20
          done
          echo "Nem jott meg az uj deploy a varakozasi ablakban. Utolso: $BODY"
          exit 1
